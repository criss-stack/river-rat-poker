<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>River Rat Poker</title>
    <link rel="stylesheet" href="style.css?v=20260515-0003" />

    <!-- PWA & mobile install -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#16776f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="assets/dealer_rat/Rat_Happy.png" />
  </head>
  <body>
    <main class="game-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Rat-world casino hold'em</p>
          <h1>River Rat Poker</h1>
        </div>
        <div class="top-actions">
          <button id="settings-toggle" class="icon-button" aria-expanded="false" aria-controls="settings-panel" title="Settings">⚙</button>
          <button id="new-hand-btn" class="wood-button">New Hand</button>
        </div>
      </header>

      <section class="table-stage" aria-label="River Rat poker table">
        <div id="banner" class="banner" aria-live="polite"></div>

        <article id="seat-2" class="player-panel seat top-left-seat"></article>
        <article id="seat-3" class="player-panel seat top-right-seat"></article>
        <article id="seat-1" class="player-panel seat left-seat"></article>
        <article id="seat-4" class="player-panel seat right-seat"></article>
        <article id="seat-0" class="player-panel seat bottom-seat human-seat"></article>

        <div class="dealer-character" aria-label="House dealer">
          <img id="dealer-rat" src="assets/dealer_rat/Rat_Idle.png" alt="Idle rat dealer shuffling cards" />
          <span>House Dealer</span>
        </div>

        <div class="poker-table">
          <div class="felt-ripples"></div>
          <div class="table-center">
            <div class="pot-display">
              <img class="pot-icon" src="assets/table/Pot.png" alt="" />
              <div>
                <strong id="pot-amount">$0</strong>
                <small id="street-label">Waiting</small>
              </div>
            </div>
            <div id="community-cards" class="community-cards" aria-label="Community cards"></div>
            <div class="chip-bank" aria-label="Casino chip artwork">
              <img src="assets/chips/Chip_1.png" alt="$1 teal pawprint chip" />
              <img src="assets/chips/Chip_5.png" alt="$5 cheese chip" />
              <img src="assets/chips/Chip_25.png" alt="$25 crowned rat chip" />
              <img src="assets/chips/Chip_100.png" alt="$100 black crest chip" />
              <img src="assets/chips/Chip_500.png" alt="$500 royal rat chip" />
            </div>
            <div id="turn-info" class="turn-info">Press New Hand to sit down.</div>
          </div>
        </div>
      </section>

      <section class="action-bar" aria-label="Player actions">
        <div class="action-summary">
          <strong id="action-title">No hand in progress</strong>
          <span id="action-detail">Stacks persist between hands. Blinds apply when a new hand starts.</span>
          <button id="log-toggle" class="icon-button" aria-expanded="false" aria-controls="log-panel" title="Hand Log">≡</button>
        </div>
        <div class="amount-control" aria-label="Bet amount">
          <div class="amount-head">
            <label for="bet-range" id="bet-label">Bet / Raise To</label>
            <strong id="bet-value">$20</strong>
          </div>
          <input id="bet-amount" type="hidden" min="0" step="5" value="20" />
          <div class="amount-stepper">
            <button id="bet-minus" type="button" aria-label="Decrease bet amount">-</button>
            <input id="bet-range" type="range" min="0" max="1000" step="5" value="20" />
            <button id="bet-plus" type="button" aria-label="Increase bet amount">+</button>
          </div>
        </div>
        <div class="actions">
          <button id="fold-btn">Fold</button>
          <button id="check-call-btn">Check</button>
          <button id="bet-raise-btn">Bet</button>
        </div>
      </section>

      <section class="below-table">
        <details id="settings-panel" class="settings-panel">
          <summary>Table Settings</summary>
          <div class="settings">
            <div class="blind-control">
              <span>Small Blind</span>
              <div>
                <button id="small-blind-minus" type="button" aria-label="Decrease small blind">-</button>
                <strong id="small-blind-value">$5</strong>
                <button id="small-blind-plus" type="button" aria-label="Increase small blind">+</button>
              </div>
              <input id="small-blind" type="hidden" min="1" step="1" value="5" />
            </div>
            <div class="blind-control">
              <span>Big Blind</span>
              <div>
                <button id="big-blind-minus" type="button" aria-label="Decrease big blind">-</button>
                <strong id="big-blind-value">$10</strong>
                <button id="big-blind-plus" type="button" aria-label="Increase big blind">+</button>
              </div>
              <input id="big-blind" type="hidden" min="2" step="1" value="10" />
            </div>
          </div>
        </details>

        <details id="log-panel" class="log-panel">
          <summary>Hand Log</summary>
          <ol id="hand-log"></ol>
        </details>
      </section>
    </main>

    <script src="script.js?v=20260515-0003"></script>
  </body>
</html>
